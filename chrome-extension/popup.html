<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Proctor Capture</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        min-width: 320px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }

      input,
      button {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
        box-sizing: border-box;
      }

      .row {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      p {
        font-size: 12px;
        color: #333;
      }

      .hint {
        color: #555;
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <h1>Proctor Background Agent</h1>
    <p class="hint">Runs in background. On capture command, screenshots current active tab.</p>

    <label for="apiBase">API Base URL</label>
    <input id="apiBase" placeholder="http://localhost:3000" />

    <label for="username">Username</label>
    <input id="username" placeholder="proctor" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="proctor123" />

    <div class="row">
      <button id="saveConfig">Save</button>
      <button id="startAgent">Start Background</button>
    </div>
    <button id="stopAgent">Stop Background</button>

    <p id="status">Set config, then click Start Background.</p>

    <script src="popup.js"></script>
  </body>
</html>
